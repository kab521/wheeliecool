<style>
.footer{
    width:100%;
    background:#ffffff;
    padding:20px 0;
    text-align:center;
    color:#000;
    margin-top:40px;
}

    .read-more{
    display:inline-flex;
    align-items:center;
    gap:8px;
    text-decoration:none;
    color:white;
    background:#111;
    padding:13px 22px;
    border-radius:999px;
    transition:0.25s ease;
    font-size:15px;
}

.read-more:hover{
    background:#333;
    transform:translateX(4px);
}

:root{
    --bg:#f6f3f4;
    --card:rgba(255,255,255,0.82);
    --text:#1d1d1d;
    --muted:#666;
    --accent:#111;
    --soft:#ece7e8;
    --border:rgba(255,255,255,0.5);
    --shadow:0 12px 40px rgba(0,0,0,0.08);
    --radius:32px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:"Futura", Arial, sans-serif;
    background: #fff;
    line-height:1.8;
    overflow-x:hidden;
}

.header{
    position:sticky;
    top:0;
    z-index:1000;
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,0.72);
    border-bottom:1px solid rgba(255,255,255,0.5);
    box-shadow:0 4px 20px rgba(0,0,0,0.04);
}

.navbar{
    width:min(1180px,92%);
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 0;
    gap:20px;
}

.logo img{
    width:150px;
    display:block;
    transition:0.3s ease;
}

.logo img:hover{
    transform:scale(1.03);
}

.nav-links{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.nav-links a{
    text-decoration:none;
    color:#2b2b2b;
    padding:10px 18px;
    border-radius:999px;
    font-size:14px;
    letter-spacing:0.3px;
    background:rgba(255,255,255,0.65);
    border:1px solid rgba(0,0,0,0.04);
    transition:0.28s ease;
}

.nav-links a:hover{
    background:#111;
    color:white;
    transform:translateY(-2px);
}

.container{
    width:min(1120px,92%);
    margin:auto;
    padding:90px 0;
}

.page-title{
    text-align:center;
    margin-bottom:70px;
}

.page-title h1{
    font-size:clamp(52px,8vw,92px);
    line-height:0.95;
    letter-spacing:-4px;
    margin-bottom:24px;
    font-weight:700;
}

.page-title p{
    max-width:760px;
    margin:auto;
    color:var(--muted);
    font-size:18px;
}

.card{
    background:var(--card);
    backdrop-filter:blur(18px);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow);
    padding:0;
    animation:fadeUp 0.7s ease;
}

.card img{
    width:100%;
    display:block;
}

.hero-image{
    overflow:hidden;
    position:relative;
}

.hero-image img{
    transition:0.45s ease;
}

.hero-image:hover img{
    transform:scale(1.02);
}

.card-content{
    padding:42px;
}

.spec-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin-bottom:40px;
}

.spec-box{
    background:#f7f5f5;
    border-radius:24px;
    padding:24px;
    border:1px solid rgba(0,0,0,0.04);
    transition:0.3s ease;
}

.spec-box:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 24px rgba(0,0,0,0.06);
}

.spec-box h3{
    margin-bottom:14px;
    font-size:22px;
    letter-spacing:-0.5px;
}

.spec-box ul{
    padding-left:18px;
}

.spec-box li{
    margin-bottom:8px;
    color:#444;
}
.review-text{
    font-size:17px;
    color:#2a2a2a;
}

.review-text p{
    margin-bottom:28px;
}

/* DIVIDER */

.divider{
    width:100%;
    height:1px;
    background:linear-gradient(to right, transparent, #d7d2d3, transparent);
    margin:45px 0;
}


@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(24px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media (max-width:768px){

    .navbar{
        flex-direction:column;
        justify-content:center;
    }

    .page-title h1{
        letter-spacing:-2px;
    }

    .card-content{
        padding:28px;
    }

    .spec-grid{
        grid-template-columns:1fr;
    }

}

</style>

<style>
.gallery{
    width:min(1200px, 92%);
    margin:50px auto;

    display:grid;
    grid-template-columns: repeat(4, 1fr);

    gap:22px;
    justify-content:center;
}

.gallery img{
    width:100%;
    aspect-ratio:4 / 3;

    object-fit:cover;
    display:block;

    border-radius:24px;

    background: rgba(255,255,255,0.82);
    border:1px solid rgba(255,255,255,0.35);

    box-shadow:0 10px 30px rgba(0,0,0,0.08);

    transition:0.3s ease;

    cursor:pointer;
}

.gallery img:hover{
    transform:translateY(-5px) scale(1.02);

    box-shadow:0 18px 40px rgba(0,0,0,0.14);
}

.lightbox{
    display:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.82);

    z-index:9999;

    justify-content:center;
    align-items:center;

    padding:40px;

    backdrop-filter:blur(8px);
}

.lightbox img{
    max-width:90%;
    max-height:90vh;

    border-radius:28px;

    box-shadow:0 20px 60px rgba(0,0,0,0.4);

    animation:zoomIn 0.25s ease;
}

@keyframes zoomIn{
    from{
        transform:scale(0.92);
        opacity:0;
    }

    to{
        transform:scale(1);
        opacity:1;
    }
}

@media (max-width:1000px){

    .gallery{
        grid-template-columns:repeat(3, 1fr);
    }

}

@media (max-width:700px){

    .gallery{
        grid-template-columns:repeat(2, 1fr);
    }

}

@media (max-width:500px){

    .gallery{
        grid-template-columns:1fr;
    }

}
